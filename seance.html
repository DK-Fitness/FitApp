<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Séance</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0d0d0d;
    --surface: #141414;
    --card:    #1a1a1a;
    --border:  #2a2a2a;
    --accent:  #e8390e;
    --accent2: #ff6b35;
    --text:    #f0f0f0;
    --muted:   #888;
    --soft:    #555;
    --green:   #22c55e;
    --blue:    #5a67ff;
    --red:     #ef4444;
    --gold:    #f4b942;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 40px 20px 100px;
  }

  .page { max-width: 860px; margin: 0 auto; }

  /* ── NAV BACK ── */
  .nav-back {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted); text-decoration: none;
    letter-spacing: 1px; font-weight: 600; text-transform: uppercase;
    margin-bottom: 20px; transition: color .2s;
  }
  .nav-back:hover { color: var(--accent); }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 18px; margin-bottom: 20px;
    flex-wrap: wrap; gap: 16px;
  }
  .header-left { display: flex; flex-direction: column; gap: 4px; }
  .label-top { font-size: 11px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: 72px; line-height: 1; letter-spacing: 2px; }
  .subtitle { font-size: 13px; color: var(--muted); letter-spacing: 1px; }
  .header-stats { display: flex; gap: 24px; align-items: flex-end; }
  .stat-block { text-align: right; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .divider-v { width: 1px; height: 40px; background: var(--border); }

  /* ── LIVE BANNER — métriques séance en cours ── */
  .session-live-banner {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 14px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
  }
  .slb-block {
    display: flex; flex-direction: column; gap: 2px;
    padding: 0 20px 0 0; margin: 0 20px 0 0;
    border-right: 1px solid var(--border);
  }
  .slb-block:first-child { padding-left: 0; }
  .slb-block:last-of-type { border-right: none; margin-right: 0; }
  .slb-val { font-family: 'Bebas Neue', sans-serif; font-size: 24px; line-height: 1; }
  .slb-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .slb-indicator {
    margin-left: auto;
    font-size: 12px; font-weight: 700;
    padding: 5px 12px; border-radius: 4px;
    background: rgba(255,255,255,.04); border: 1px solid var(--border);
  }

  /* ── ACTION BAR ── */
  .action-bar { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 10px 18px; border-radius: 5px;
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 13px;
    letter-spacing: .5px; cursor: pointer; border: none;
    transition: opacity .15s, transform .1s; text-decoration: none;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary   { background: var(--accent); color: white; }
  .btn-primary:hover { opacity: .9; }
  .btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 12px; }
  .btn-ghost:hover { border-color: #444; color: var(--text); }

  /* ── EXERCISE CARDS ── */
  .exercises-grid { display: flex; flex-direction: column; gap: 16px; margin-bottom: 28px; }

  .ex-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 18px 22px;
    display: grid;
    grid-template-columns: 48px 1fr auto;
    gap: 16px;
    align-items: start;
    transition: border-color .2s, opacity .3s, transform .3s;
    scroll-margin-top: 80px;
  }
  .ex-card:hover { border-left-color: var(--accent2); }
  .ex-card.ex-done {
    border-left-color: var(--blue);
    background: rgba(90,103,255,.08);
  }

  .ex-num {
    width: 48px; height: 48px; border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent);
    flex-shrink: 0; transition: border-color .3s, color .3s, background .3s;
  }
  .ex-card.ex-done .ex-num {
    border-color: var(--blue); color: var(--blue);
    background: rgba(90,103,255,.14);
  }

  .ex-body { display: flex; flex-direction: column; gap: 8px; }
  .ex-title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .ex-name { font-size: 17px; font-weight: 700; letter-spacing: .3px; }
  .ex-name-detail { font-weight: 400; font-size: 14px; color: var(--muted); }
  .ex-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 2px 8px; border-radius: 3px;
    background: rgba(232,57,14,.15); color: var(--accent); border: 1px solid rgba(232,57,14,.3);
  }
  .ex-muscles { font-size: 11.5px; color: var(--muted); font-style: italic; }

  /* Sets planifiés (référence) */
  .sets-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px; }
  .set-chip {
    background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 4px;
    padding: 5px 12px; display: flex; flex-direction: column; align-items: center; gap: 1px; min-width: 90px;
  }
  .set-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .set-detail { font-size: 13px; font-weight: 600; }
  .set-rir { font-size: 10px; color: var(--accent); }
  .set-chip.drop { border-color: rgba(232,57,14,.4); background: rgba(232,57,14,.07); }
  .set-chip.drop .set-label { color: var(--accent); }

  .ex-note {
    font-size: 11.5px; color: #aaa;
    background: rgba(255,255,255,.03);
    border-left: 2px solid var(--soft);
    padding: 4px 10px; border-radius: 0 3px 3px 0; margin-top: 2px;
  }

  /* ── REST BLOCK ── */
  .rest-block {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 110px;
    cursor: pointer; padding: 6px 8px; border-radius: 6px;
    border: 1px solid transparent;
    transition: border-color .2s, background .2s;
    user-select: none;
  }
  .rest-block:hover { border-color: rgba(255,107,53,.4); background: rgba(255,107,53,.07); }
  .rest-block:hover .rest-hint { opacity: 1; }
  .rest-icon  { font-size: 20px; }
  .rest-time  { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent2); line-height: 1; white-space: nowrap; }
  .rest-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .rest-hint  { font-size: 9px; color: var(--accent2); margin-top: 2px; opacity: 0; transition: opacity .2s; text-align: right; }

  /* ═══════════════════════════════════════════════════════════
     CARD LOG ZONE
  ═══════════════════════════════════════════════════════════ */

  .card-log-zone {
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* Contexte */
  .clz-context {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    padding: 8px 10px;
    background: rgba(255,255,255,.02);
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .clz-last { font-size: 11px; color: var(--muted); }
  .clz-last-detail { color: var(--soft); }
  .clz-new  { font-style: italic; color: var(--soft); font-size: 11px; }
  .clz-pr   { font-size: 11px; font-weight: 700; color: var(--gold);
               background: rgba(244,185,66,.08); border: 1px solid rgba(244,185,66,.2);
               padding: 2px 8px; border-radius: 3px; }
  .clz-suggest { font-size: 10px; color: var(--accent2);
                  background: rgba(255,107,53,.08); border: 1px solid rgba(255,107,53,.2);
                  padding: 2px 8px; border-radius: 3px; }

  /* Rows de sets */
  .clz-sets { display: flex; flex-direction: column; gap: 6px; }

  .clz-set-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 4px 0;
    border-radius: 4px;
    transition: background .15s;
  }
  .clz-set-row.clz-drop-set { padding-left: 6px; border-left: 2px solid rgba(232,57,14,.4); }

  @keyframes clzShake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-4px); }
    75%      { transform: translateX(4px); }
  }
  .clz-shake { animation: clzShake .3s ease; }

  .clz-set-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent); min-width: 72px; flex-shrink: 0;
  }
  .clz-label-drop { color: var(--accent2); }

  .clz-fields { display: flex; align-items: center; gap: 6px; flex: 1; flex-wrap: wrap; }

  .clz-input {
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    border-radius: 4px; color: var(--text);
    padding: 9px 10px; font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    width: 74px;
    transition: border-color .2s, background .2s;
    text-align: center;
  }
  .clz-input:focus { outline: none; border-color: var(--accent); background: rgba(232,57,14,.05); }
  .clz-input::placeholder { color: var(--soft); font-size: 13px; }

  /* État validé */
  .clz-input.clz-validated {
    background: rgba(34,197,94,.07);
    border-color: rgba(34,197,94,.3);
    color: var(--green);
  }
  /* Valeur pré-remplie (suggestion) — couleur différente avant focus */
  .clz-input:not(:focus):not(.clz-validated):not(:placeholder-shown) {
    border-color: rgba(255,255,255,.1);
    color: var(--muted);
  }

  .clz-kg   { width: 82px; }
  .clz-reps { width: 70px; }
  .clz-rir  { width: 58px; }

  .clz-sep { font-size: 14px; color: var(--soft); font-weight: 600; }
  .clz-sep-rir { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--soft); }

  .clz-validate-btn {
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    color: var(--muted); border-radius: 4px; cursor: pointer;
    padding: 8px 12px; font-size: 14px; font-weight: 700;
    transition: background .15s, color .15s, border-color .15s;
    flex-shrink: 0; min-width: 38px; text-align: center;
  }
  .clz-validate-btn:hover { background: rgba(34,197,94,.15); border-color: var(--green); color: var(--green); }
  .clz-validate-btn.clz-edit-mode {
    color: var(--accent2); border-color: rgba(255,107,53,.4);
    background: rgba(255,107,53,.07);
  }

  .clz-set-status {
    font-size: 11px; font-weight: 700; min-width: 80px; text-align: left;
    white-space: nowrap;
  }
  .clz-status-ok   { color: var(--green); }
  .clz-status-pr   { color: var(--gold); }
  .clz-status-up   { color: var(--green); }
  .clz-status-down { color: var(--red); }
  .clz-status-warn { color: var(--red); }

  /* Footer card log */
  .clz-footer {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding-top: 4px;
  }
  .clz-feedback { font-size: 12px; font-weight: 600; }
  .clz-fb-ok   { color: var(--green); }
  .clz-fb-warn { color: var(--red); }

  /* ── TIPS PANEL ── */
  .tips-panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 20px 22px; margin-bottom: 14px;
  }
  .panel-title {
    font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 14px;
  }
  .tips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tip-item { display: flex; gap: 10px; font-size: 12px; color: var(--muted); line-height: 1.5; }
  .tip-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .tip-head { display: block; font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 1px; }

  /* ── FOOTER ── */
  .footer {
    margin-top: 14px; display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
    padding: 14px 0; border-top: 1px solid var(--border);
  }
  .footer-tag { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--soft); }
  .footer-accent { color: var(--accent); }
  .recap-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .rchip {
    font-size: 10px; color: var(--muted);
    background: rgba(255,255,255,.04); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 10px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    body { padding: 16px 12px 100px; }
    .title { font-size: 52px; }
    .header-stats { display: none; }

    .ex-card {
      grid-template-columns: 38px 1fr;
      gap: 10px; padding: 14px;
    }
    .rest-block { display: none; }

    .clz-input { padding: 10px 8px; }
    .clz-kg    { width: 76px; }
    .clz-reps  { width: 66px; }
    .clz-rir   { width: 54px; }

    .clz-validate-btn { padding: 9px 12px; }
    .tips-grid { grid-template-columns: 1fr; }
    .btn { padding: 12px 16px; font-size: 13px; }

    .session-live-banner { gap: 0; padding: 12px 14px; }
    .slb-block { padding: 0 14px 0 0; margin: 0 14px 0 0; }
    .slb-indicator { margin-left: 0; margin-top: 8px; width: 100%; text-align: center; }
  }
</style>
</head>
<body>
<div class="page" id="page">

  <a href="index.html" class="nav-back">← Retour au hub</a>
  <div id="app-root"></div>

</div>

<script src="sessions.js"></script>
<script src="workouts.js"></script>
<script src="training.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="cloud.js"></script>
<script>
if (window.C) C.requireAuthOrRedirect();
/* ═══════════════════════════════════════════════════════════════
   seance.html — Orchestrateur v4
═══════════════════════════════════════════════════════════════ */

(function () {

  /* ── 1. Lecture du slug ── */
  const params  = new URLSearchParams(location.search);
  const SESSION = params.get('slug') || '';
  const allWorkouts = T.getAllWorkoutsMap(WORKOUTS);
  const workout = allWorkouts[SESSION];

  if (!workout) {
    document.getElementById('app-root').innerHTML =
      `<p style="color:var(--red);margin-top:40px;">Séance "${SESSION}" introuvable dans workouts.js.</p>`;
    return;
  }

  document.title = `Séance ${workout.title}`;

  const exercises     = workout.exercises;
  const exerciseNames = exercises.map(e => e.name);

  /* ── 2. Header ── */
  function renderHeader() {
    const prs = exerciseNames.filter(name => {
      const h = T.getHistory(SESSION, name);
      if (h.length < 2) return false;
      const curr = Math.max(0, ...((h[0].sets || []).map(s => parseFloat(s.kg) || 0)));
      const prev = Math.max(0, ...((h[1].sets || []).map(s => parseFloat(s.kg) || 0)));
      return curr > prev;
    });
    return `
      <div class="header">
        <div class="header-left">
          <span class="label-top">Groupe musculaire</span>
          <div class="title">${workout.title}</div>
          <div class="subtitle">${workout.subtitle}</div>
        </div>
        <div class="header-stats">
          <div class="stat-block">
            <div class="stat-val" id="stat-pr">${prs.length || '—'}</div>
            <div class="stat-label">PR actif</div>
          </div>
          <div class="divider-v"></div>
          <div class="stat-block">
            <div class="stat-val">${exercises.length}</div>
            <div class="stat-label">Exercices</div>
          </div>
        </div>
      </div>`;
  }

  /* ── 3. Live Banner ── */
  function renderLiveBanner() {
    const volPrev = T.getSessionVolume(SESSION, exerciseNames, 1);
    return `
      <div class="session-live-banner" id="session-live-banner">
        <div class="slb-block">
          <span class="slb-val" id="live-vol">—</span>
          <span class="slb-label">Volume séance</span>
        </div>
        <div class="slb-block">
          <span class="slb-val" id="live-sets">—</span>
          <span class="slb-label">Sets validés</span>
        </div>
        <div class="slb-block">
          <span class="slb-val" id="live-prs" style="color:var(--gold)">—</span>
          <span class="slb-label">PR en cours</span>
        </div>
        <div class="slb-block">
          <span class="slb-val" id="live-delta" style="color:var(--soft)">—</span>
          <span class="slb-label">vs précédente</span>
        </div>
        <span class="slb-indicator" id="live-indicator">Commence le log</span>
      </div>`;
  }

  /* ── 4. Action bar ── */
  function renderActionBar() {
    return `
      <div class="action-bar">
        <button class="btn btn-primary" id="start-workout-btn" onclick="startSession()">⚡ Start Workout</button>
        <button class="btn btn-primary" onclick="finishSession()">🏁 Terminer la séance</button>
        <a href="progression.html?session=${SESSION}" class="btn btn-ghost">📈 Progression</a>
        <a href="profil.html" class="btn btn-ghost">👤 Profil</a>
      </div>`;
  }

  /* ── 5. Cards exercice ── */
  function renderExerciseCard(ex, idx) {
    const nameHtml = ex.nameDetail
      ? `${ex.name} <span class="ex-name-detail">${ex.nameDetail}</span>`
      : ex.name;

    const setsChips = ex.sets.map(s => `
      <div class="set-chip${s.drop ? ' drop' : ''}">
        <span class="set-label">${s.label}</span>
        <span class="set-detail">${s.charge}</span>
        ${s.rir ? `<span class="set-rir">${s.reps} · ${s.rir}</span>` : `<span class="set-rir">${s.reps}</span>`}
      </div>`).join('');

    return `
      <div class="ex-card" data-ex-idx="${idx}" data-ex-name="${ex.name}">
        <div class="ex-num">${String(idx + 1).padStart(2, '0')}</div>
        <div class="ex-body">
          <div class="ex-title-row">
            <span class="ex-name">${nameHtml}</span>
            <span class="ex-badge">${ex.badge}</span>
          </div>
          <div class="ex-muscles">${ex.muscles}</div>
          <div class="sets-row">${setsChips}</div>
          ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
        </div>
        ${ex.restSec ? `
        <div class="rest-block" onclick="T.startTimer(${ex.restSec}, '${ex.name.replace(/'/g, "\\'")}')" title="Clic pour lancer le timer">
          <span class="rest-icon">⏱</span>
          <span class="rest-time">${ex.restLabel}</span>
          <span class="rest-label">Repos</span>
          <span class="rest-hint">▶ Lancer</span>
        </div>` : ''}
      </div>`;
  }

  /* ── 6. Tips ── */
  function renderTips() {
    if (!workout.tips || !workout.tips.length) return '';
    const items = workout.tips.map(t => `
      <div class="tip-item">
        <span class="tip-icon">${t.icon}</span>
        <div><span class="tip-head">${t.head}</span>${t.body}</div>
      </div>`).join('');
    return `
      <div class="tips-panel">
        <div class="panel-title">Conseils d'exécution</div>
        <div class="tips-grid">${items}</div>
      </div>`;
  }

  /* ── 7. Footer ── */
  function renderFooter() {
    const f = workout.footer || {};
    const chips = [f.sets, f.duration, f.note].filter(Boolean).map(c =>
      `<span class="rchip">${c}</span>`).join('');
    return `
      <div class="footer">
        <span class="footer-tag">Récap global</span>
        <div class="recap-chips">${chips}</div>
        <span class="footer-tag"><span class="footer-accent">${workout.title}</span> SESSION</span>
      </div>`;
  }

  /* ── 8. Rendu principal ── */
  function render() {
    const cardsHtml = exercises.map((ex, i) => renderExerciseCard(ex, i)).join('');

    document.getElementById('app-root').innerHTML =
      renderHeader() +
      renderLiveBanner() +
      renderActionBar() +
      `<div class="exercises-grid" id="exercises-grid">${cardsHtml}</div>` +
      renderTips() +
      renderFooter();

    // Injecte les card logs
    document.querySelectorAll('.ex-card').forEach((card, i) => {
      T.initCardLog(card, SESSION, exercises[i].name, exercises[i].sets);
    });

    // Init bannière live
    T.initLiveBanner(SESSION, exerciseNames);

    // Marque les cards déjà sauvegardées aujourd'hui
    refreshDoneCards();
  }

  /* ── 9. Marque les cards "done" si sauvegardées aujourd'hui ── */
  function refreshDoneCards() {
    document.querySelectorAll('.ex-card').forEach(card => {
      const name = card.dataset.exName;
      if (!name) return;
      card.classList.toggle('ex-done', T.isExerciseFullyValidated(SESSION, name));
    });

    // Mise à jour des stats header
    const prs = exerciseNames.filter(name => {
      const h = T.getHistory(SESSION, name);
      if (h.length < 2) return false;
      const curr = Math.max(0, ...((h[0].sets || []).map(s => parseFloat(s.kg) || 0)));
      const prev = Math.max(0, ...((h[1].sets || []).map(s => parseFloat(s.kg) || 0)));
      return curr > prev;
    });
    const el = document.getElementById('stat-pr');
    if (el) el.textContent = prs.length || '—';
  }

  /* ── 10. Start Workout (avec passage session + exercices) ── */
  window.startSession = function () {
    T.startWorkout(SESSION, exerciseNames);
  };

  window.finishSession = function () {
    T.finishSession();
  };

  /* ── 11. Refresh après sauvegarde ── */
  document.addEventListener('exercise-saved', () => {
    refreshDoneCards();
  });
  document.addEventListener('exercise-validation-changed', () => {
    refreshDoneCards();
  });

  render();

})();
</script>
</body>
</html>
